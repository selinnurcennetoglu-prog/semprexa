<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#191B37"/>
      <stop offset="100%" style="stop-color:#411E57"/>
    </linearGradient>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F966AB"/>
      <stop offset="50%" style="stop-color:#E21C70"/>
      <stop offset="100%" style="stop-color:#872D72"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDABBE"/>
      <stop offset="100%" style="stop-color:#DE5C8F"/>
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4EBB"/>
      <stop offset="100%" style="stop-color:#411E57"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#7C4EBB" stroke-width="2" opacity="0.95"/>

  <!-- Lily petals - 6 petals -->
  <ellipse cx="100" cy="68" rx="12" ry="32" fill="url(#petal)" opacity="0.85" transform="rotate(0 100 100)"/>
  <ellipse cx="100" cy="68" rx="12" ry="32" fill="url(#petal)" opacity="0.75" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="68" rx="12" ry="32" fill="url(#petal)" opacity="0.65" transform="rotate(120 100 100)"/>
  <ellipse cx="100" cy="68" rx="12" ry="32" fill="url(#petal2)" opacity="0.7" transform="rotate(180 100 100)"/>
  <ellipse cx="100" cy="68" rx="12" ry="32" fill="url(#petal2)" opacity="0.6" transform="rotate(240 100 100)"/>
  <ellipse cx="100" cy="68" rx="12" ry="32" fill="url(#petal2)" opacity="0.5" transform="rotate(300 100 100)"/>

  <!-- Inner detail -->
  <circle cx="100" cy="100" r="8" fill="#E21C70" opacity="0.9"/>
  <circle cx="100" cy="100" r="4" fill="#F966AB" opacity="0.8"/>

  <!-- Small sparkle dots -->
  <circle cx="60" cy="55" r="2" fill="#F966AB" opacity="0.6"/>
  <circle cx="145" cy="60" r="1.5" fill="#EDABBE" opacity="0.5"/>
  <circle cx="50" cy="130" r="1.5" fill="#7C4EBB" opacity="0.5"/>
  <circle cx="155" cy="140" r="2" fill="#E21C70" opacity="0.4"/>
</svg>
