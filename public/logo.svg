<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8884d"/>
      <stop offset="30%" stop-color="#dbc48a"/>
      <stop offset="50%" stop-color="#c8a960"/>
      <stop offset="70%" stop-color="#dbc48a"/>
      <stop offset="100%" stop-color="#a8884d"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8884d"/>
      <stop offset="50%" stop-color="#c8a960"/>
      <stop offset="100%" stop-color="#a8884d"/>
    </linearGradient>
  </defs>

  <!-- Crown -->
  <g transform="translate(200, 8)">
    <!-- Crown base -->
    <path d="M-28,32 L-28,22 L-20,26 L-10,12 L0,22 L10,12 L20,26 L28,22 L28,32 Z" fill="url(#gold)"/>
    <!-- Crown tips -->
    <circle cx="-28" cy="20" r="3" fill="url(#gold)"/>
    <circle cx="-10" cy="10" r="3" fill="url(#gold)"/>
    <circle cx="0" cy="20" r="3.5" fill="url(#gold)"/>
    <circle cx="10" cy="10" r="3" fill="url(#gold)"/>
    <circle cx="28" cy="20" r="3" fill="url(#gold)"/>
    <!-- Crown band -->
    <rect x="-28" y="32" width="56" height="5" rx="1" fill="url(#goldDark)"/>
  </g>

  <!-- Divider lines -->
  <line x1="60" y1="58" x2="140" y2="58" stroke="url(#goldDark)" stroke-width="0.5" opacity="0.5"/>
  <line x1="260" y1="58" x2="340" y2="58" stroke="url(#goldDark)" stroke-width="0.5" opacity="0.5"/>
  <!-- Center diamond -->
  <rect x="196" y="55" width="8" height="8" rx="1" transform="rotate(45, 200, 59)" fill="url(#gold)" opacity="0.6"/>

  <!-- SEMPREXA text -->
  <text x="200" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="400" letter-spacing="12" fill="url(#gold)">SEMPREXA</text>

  <!-- Tagline -->
  <text x="200" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="8" letter-spacing="4" fill="#a8884d" opacity="0.6">ZARAFET VE TEKNOLOJİ</text>
</svg>
